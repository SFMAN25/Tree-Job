<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BOSS CONTROL PANEL</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #334155; }
        th { background: #fbbf24; color: black; }
        .user-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h1>لوحة تحكم المدير (الشجرة)</h1>
        <table id="adminTable">
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>المحفظة</th>
                    <th>الراتب</th>
                    <th>التقييم</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        if(sessionStorage.getItem('isAdmin') !== 'true') window.location.href = 'admin-login.html';

        fetch('https://sheetdb.io/api/v1/uvhb8vxlpe7ve')
        .then(res => res.json())
        .then(users => {
            const body = document.getElementById('tableBody');
            users.forEach(user => {
                body.innerHTML += `
                    <tr>
                        <td><img src="${user.PicUrl}" class="user-img"></td>
                        <td>${user.Name}</td>
                        <td>${user.Phone}</td>
                        <td>${user.Wallet} (${user.PaymentMethod})</td>
                        <td style="color:#fbbf24; font-weight:bold;">${user.Salary} ج</td>
                        <td>${user.Rating} ⭐</td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
