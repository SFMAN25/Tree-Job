<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>إدارة BOSS</title>
    <style>
        body { background:#0f172a; color:white; font-family:sans-serif; padding:20px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; background:#1e293b; border-radius:10px; overflow:hidden; }
        th, td { border:1px solid #334155; padding:12px; text-align:center; }
        th { background: #fbbf24; color:black; }
        button { cursor:pointer; padding:6px 12px; margin:2px; border-radius:5px; border:none; font-weight:bold; }
        .act { background:#4ade80; color:black; } .del { background:#f87171; color:white; }
        input { background:#0f172a; color:white; border:1px solid #334155; padding:5px; border-radius:4px; text-align:center; }
    </style>
</head>
<body>
    <h2>إدارة فريق BOSS</h2>
    <button onclick="load()" style="background:#38bdf8; color:black;">تحديث البيانات 🔄</button>
    <table id="userTable">
        <thead><tr><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>الراتب</th><th>التقييم</th><th>أوامر</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
    <script>
        const api = 'https://script.google.com/macros/s/AKfycbyOQgrUIdWgOk2pIFV_g5EnpcgEkHSKYRXYRZeIV3Aec5O0uUm4qsZ6TYhtkdl1lCCx/exec';
        async function load() {
            document.getElementById('res').innerHTML = "<tr><td colspan='6'>جاري جلب البيانات...</td></tr>";
            const res = await fetch(api);
            const users = await res.json();
            let html = '';
            users.forEach(u => {
                html += `<tr>
                    <td>${u.Name}</td><td>${u.Phone}</td>
                    <td style="color:${u.Status==='Active'?'#4ade80':'#fbbf24'}">${u.Status}</td>
                    <td><input type="number" id="s-${u.Phone}" value="${u.Salary}" style="width:70px"></td>
                    <td><input type="number" id="r-${u.Phone}" value="${u.Rating}" style="width:50px"></td>
                    <td>
                        <button class="act" onclick="update('${u.Phone}', 'Active')">تفعيل</button>
                        <button onclick="save('${u.Phone}')" style="background:white;">حفظ</button>
                        <button class="del" onclick="del('${u.Phone}')">حذف</button>
                    </td>
                </tr>`;
            });
            document.getElementById('res').innerHTML = html;
        }
        async function update(p, s) {
            await fetch(api, { method:'POST', mode:'no-cors', body:JSON.stringify({action:'update', Phone:p, Status:s}) });
            alert("تم تفعيل الحساب"); load();
        }
        async function save(p) {
            const s = document.getElementById(`s-${p}`).value;
            const r = document.getElementById(`r-${p}`).value;
            await fetch(api, { method:'POST', mode:'no-cors', body:JSON.stringify({action:'update', Phone:p, Salary:s, Rating:r}) });
            alert("تم تحديث الراتب والتقييم");
        }
        async function del(p) {
            if(confirm("هل أنت متأكد من حذف هذا المسوق نهائياً؟")) {
                await fetch(api, { method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', Phone:p}) });
                load();
            }
        }
        load();
    </script>
</body>
</html>
