<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحتي | BOSS</title>
    <style>
        body { background:url('https://files.catbox.moe/n4mjhu.png') center/cover; color:white; font-family:sans-serif; display:flex; justify-content:center; padding-top:50px; min-height: 100vh; margin:0; }
        .box { background:rgba(15,23,42,0.9); padding:30px; border-radius:20px; width:350px; text-align:center; border:1px solid #fbbf24; height: fit-content; }
        .stat { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; border-right: 4px solid #fbbf24; }
        .gold { color:#fbbf24; font-size:24px; font-weight:bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="un">جاري التحميل...</h2>
        <div class="stat">الراتب الحالي <div class="gold" id="us">0</div></div>
        <div class="stat">التقييم <div class="gold" id="ur">0</div></div>
        <div class="stat">المنطقة <div id="ua">...</div></div>
        <button onclick="localStorage.clear(); location.href='index.html'" style="background:#f87171; color:white; border:none; padding:10px; cursor:pointer; width:100%; border-radius:10px; margin-top:10px;">تسجيل الخروج</button>
    </div>
    <script>
        const u = JSON.parse(localStorage.getItem('boss_user'));
        if(!u) location.href='index.html';
        document.getElementById('un').innerText = "أهلاً، " + u.Name;
        document.getElementById('us').innerText = (u.Salary || 0) + " ج.م";
        document.getElementById('ur').innerText = (u.Rating || 0) + " ⭐";
        document.getElementById('ua').innerText = u.Work_Area || "غير محدد";
    </script>
</body>
</html>
