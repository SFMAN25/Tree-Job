<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة حسابي | BOSS</title>
    <style>
        :root { --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; text-align: center; }
        .header { background: #1e293b; padding: 20px; border-bottom: 2px solid var(--gold); }
        .profile-section { margin-top: 50px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; margin-bottom: 15px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding: 0 10px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 15px; width: 150px; border: 1px solid #334155; }
        .stat-box h4 { margin: 0; color: #94a3b8; font-size: 14px; }
        .stat-box p { font-size: 22px; font-weight: bold; color: var(--gold); margin: 10px 0 0 0; }
        .btn-exit { margin-top: 50px; display: inline-block; color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="welcomeName">أهلاً بك</h2>
    </div>

    <div class="profile-section">
        <img src="" id="userPic" class="profile-img" alt="بروفايل">
        <h3 id="displayName">جاري التحميل...</h3>
        <p style="color: #38bdf8;">مسوق معتمد في فريق BOSS</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <h4>راتبك الحالي</h4>
            <p id="userSalary">0 ج</p>
        </div>
        <div class="stat-box">
            <h4>تقييمك</h4>
            <p id="userRating">--</p>
        </div>
    </div>

    <a href="index.html" class="btn-exit" onclick="localStorage.clear()">تسجيل خروج</a>

    <script>
        // قراءة البيانات اللي حفظناها وقت الدخول
        const userData = JSON.parse(localStorage.getItem('currentUser'));
        
        if(!userData) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('welcomeName').innerText = "أهلاً يا " + userData.Name.split(' ')[0];
            document.getElementById('displayName').innerText = userData.Name;
            document.getElementById('userPic').src = userData.PicUrl || 'https://files.catbox.moe/lhgbrl.png';
            document.getElementById('userSalary').innerText = userData.Salary + " ج";
            document.getElementById('userRating').innerText = userData.Rating + " ⭐";
        }
    </script>
</body>
</html>
