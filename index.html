<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | BOSS</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(30, 41, 59, 0.7); }
        body { margin: 0; background: url('https://files.catbox.moe/x4wlsm.png') center/cover; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(15,23,42,0.8); border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--gold);">تسجيل دخول المسوقين</h2>
        <p>أدخل رقم الهاتف المسجل للدخول</p>
        <input type="tel" id="userPhone" placeholder="رقم الهاتف">
        <button onclick="userLogin()">دخول لوحة التحكم</button>
        <p style="margin-top:20px; font-size:13px;">ليس لديك حساب؟ <a href="register.html" style="color:var(--blue);">سجل هنا</a></p>
    </div>

    <script>
        function userLogin() {
            const phone = document.getElementById('userPhone').value;
            if(!phone) return alert('برجاء إدخال الرقم');
            
            fetch(`https://sheetdb.io/api/v1/uvhb8vxlpe7ve/search?Phone=${phone}`)
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    localStorage.setItem('currentUser', JSON.stringify(data[0]));
                    window.location.href = 'user-dash.html';
                } else {
                    alert('هذا الرقم غير مسجل عندنا يا بطل!');
                }
            });
        }
    </script>
</body>
</html>
