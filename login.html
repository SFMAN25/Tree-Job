<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | BOSS</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(30, 41, 59, 0.8); }
        body { margin: 0; background: url('https://files.catbox.moe/x4wlsm.png') center/cover; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--gold);">تسجيل دخول المسوقين</h2>
        <p>أدخل رقم موبايلك عشان تشوف حسابك</p>
        <input type="tel" id="userPhone" placeholder="رقم الهاتف المسجل">
        <button onclick="userLogin()">دخول لوحة التحكم</button>
        <p style="margin-top:20px; font-size:14px;">جديد معانا؟ <a href="register.html" style="color:var(--blue); text-decoration:none;">أنشئ حسابك من هنا</a></p>
    </div>

    <script>
        function userLogin() {
            const phone = document.getElementById('userPhone').value;
            if(!phone) return alert('يا بطل اكتب رقم تليفونك الأول!');
            
            // بنبحث في الشيت عن طريق رقم التليفون
            fetch(`https://sheetdb.io/api/v1/uvhb8vxlpe7ve/search?Phone=${phone}`)
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    // حفظ بيانات المستخدم في المتصفح عشان نفتحها في الصفحة الجاية
                    localStorage.setItem('currentUser', JSON.stringify(data[0]));
                    window.location.href = 'user-dash.html';
                } else {
                    alert('الرقم ده مش مسجل عندنا.. اتأكد من الرقم أو سجل حساب جديد.');
                }
            })
            .catch(err => alert('في مشكلة في الاتصال، حاول تاني.'));
        }
    </script>
</body>
</html>
