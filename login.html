<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | BOSS</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #fbbf24; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #fbbf24; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#fbbf24">تسجيل الدخول</h2>
        <input type="tel" id="p" placeholder="رقم الهاتف">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
    </div>
    <script>
        function login() {
            const p = document.getElementById('p').value;
            const pass = document.getElementById('pass').value;
            fetch(`https://sheetdb.io/api/v1/uvhb8vxlpe7ve/search?Phone=${p}&Password=${pass}`)
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    if(data[0].Status === "Active") {
                        localStorage.setItem('user', JSON.stringify(data[0]));
                        window.location.href = 'user-dash.html';
                    } else { alert('حسابك قيد المراجعة، تواصل مع المدير.'); }
                } else { alert('بيانات خطأ!'); }
            });
        }
    </script>
</body>
</html>
