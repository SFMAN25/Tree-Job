<script>
    function userLogin() {
        const phone = document.getElementById('userPhone').value;
        const pass = document.getElementById('userPass').value; // أضف input للباسوورد في الـ HTML

        if(!phone || !pass) return alert('اكمل البيانات يا بطل');

        fetch(`https://sheetdb.io/api/v1/uvhb8vxlpe7ve/search?Phone=${phone}&Password=${pass}`)
        .then(res => res.json())
        .then(data => {
            if(data.length > 0) {
                const user = data[0];
                if(user.Status === "Active") {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = 'user-dash.html';
                } else {
                    alert('حسابك مسجل ولكن لم يتم تفعيله بعد. تواصل مع المدير.');
                }
            } else {
                alert('عفواً! رقم الهاتف أو كلمة السر خطأ، أو تواصل مع الدعم 01285577074');
            }
        });
    }
</script>
