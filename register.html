<form id="registerForm">
    <input type="text" id="Name" placeholder="الاسم الكامل" required>
    <input type="tel" id="Phone" placeholder="رقم الهاتف (للدخول)" required>
    <input type="password" id="Password" placeholder="أنشئ كلمة سر قوية" required>
    
    <div style="display: flex; gap: 10px;">
        <input type="number" id="Age" placeholder="السن" required style="flex:1">
        <select id="PaymentMethod" required style="flex:2">
            <option value="">وسيلة الراتب</option>
            <option value="فودافون كاش">فودافون كاش</option>
            <option value="أورنج كاش">أورنج كاش</option>
            <option value="اتصالات كاش">اتصالات كاش</option>
        </select>
    </div>
    <input type="text" id="Wallet" placeholder="رقم المحفظة" required>
    
    <div class="file-upload" onclick="document.getElementById('imageInput').click()">
        <p id="uploadText">📸 اختيار صورة (اختياري)</p>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
    </div>
    <div id="statusMsg" style="font-size:12px; margin-bottom:10px;"></div>

    <button type="submit" id="submitBtn">إنشاء الحساب</button>
</form>
