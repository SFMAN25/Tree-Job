<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS SYSTEM | تسجيل جديد</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(15, 23, 42, 0.7); }
        body { margin: 0; padding: 0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .register-card { background: var(--glass); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .upload-area { color: var(--blue); font-size: 14px; cursor: pointer; margin: 10px 0; display: block; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2 style="color: var(--gold);">BOSS SYSTEM</h2>
        <p>انضم لفريق العمل</p>
        <form id="regForm">
            <input type="text" id="Name" placeholder="الاسم الكامل" required>
            <input type="tel" id="Phone" placeholder="رقم الهاتف" required>
            <input type="password" id="Password" placeholder="كلمة السر" required>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="Age" placeholder="السن" style="flex: 1;">
                <input type="text" id="Wallet" placeholder="رقم المحفظة" style="flex: 2;">
            </div>
            <select id="Payment" required>
                <option value="">وسيلة استلام الراتب</option>
                <option value="فودافون كاش">فودافون كاش</option>
                <option value="اتصالات كاش">اتصالات كاش</option>
            </select>
            <label class="upload-area" onclick="document.getElementById('imgInp').click()">
                <span id="upTxt">📸 إختيار صورة (إختياري)</span>
                <input type="file" id="imgInp" accept="image/*" style="display:none">
            </label>
            <button type="submit" id="subBtn">أنشئ حسابي بنجاح</button>
        </form>
        <p style="font-size: 12px; margin-top: 15px;">لديك حساب؟ <a href="login.html" style="color:var(--blue)">سجل دخولك</a></p>
    </div>

    <script>
        let picUrl = "https://files.catbox.moe/lhgbrl.png";

        // رفع الصورة
        document.getElementById('imgInp').onchange = function(e) {
            document.getElementById('upTxt').innerText = "جاري رفع الصورة...";
            const fd = new FormData();
            fd.append('reqtype', 'fileupload');
            fd.append('fileToUpload', e.target.files[0]);
            fetch('https://corsproxy.io/?' + encodeURIComponent('https://catbox.moe/user/api.php'), { method: 'POST', body: fd })
            .then(r => r.text()).then(url => {
                picUrl = url;
                document.getElementById('upTxt').innerText = "✅ تم اختيار الصورة";
            });
        };

        // إرسال البيانات
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const data = {
                Name: document.getElementById('Name').value,
                Phone: document.getElementById('Phone').value,
                Password: document.getElementById('Password').value,
                Age: document.getElementById('Age').value,
                Wallet: document.getElementById('Wallet').value,
                PaymentMethod: document.getElementById('Payment').value,
                PicUrl: picUrl,
                Status: "Pending", Salary: "0", Rating: "0"
            };

            fetch('https://sheetdb.io/api/v1/uvhb8vxlpe7ve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: [data]})
            }).then(() => {
                alert('تم التسجيل بنجاح! تواصل مع المدير لتفعيل حسابك.');
                window.location.href = "https://wa.me/201285577074?text=تم التسجيل باسم: " + data.Name;
            });
        };
    </script>
</body>
</html>
