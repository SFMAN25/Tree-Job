<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS SYSTEM | انضم إلينا</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow-x: hidden; }
        
        .register-card { background: var(--glass); backdrop-filter: blur(15px); padding: 35px; border-radius: 25px; border: 1px solid rgba(251, 191, 36, 0.3); width: 90%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .logo-text { font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 12px; color: white; font-size: 15px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; background: rgba(15, 23, 42, 0.9); }

        button#subBtn { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 20px; transition: 0.4s; }
        button#subBtn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4); }

        /* Success Overlay - التصميم الكرييتف */
        #successModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 1000; justify-content: center; align-items: center; text-align: center; }
        .modal-content { background: var(--glass); padding: 40px; border-radius: 30px; border: 2px solid var(--gold); transform: scale(0.7); animation: popIn 0.5s forwards; }
        @keyframes popIn { to { transform: scale(1); } }
        .check-icon { font-size: 60px; color: #4ade80; margin-bottom: 20px; display: block; }

        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--gold); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--gold), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--gold), 1em 0 0 var(--gold); } }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo-text">BOSS SYSTEM</div>
        <p style="margin-bottom: 25px; opacity: 0.8;">سجل بياناتك للانضمام إلى النخبة</p>
        
        <form id="regForm">
            <input type="text" id="Name" placeholder="الاسم بالكامل" required>
            <input type="tel" id="Phone" placeholder="رقم الهاتف (للتواصل والدخول)" required>
            <input type="password" id="Password" placeholder="أنشئ كلمة سر قوية" required>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="Age" placeholder="السن" style="flex: 1;">
                <input type="text" id="Wallet" placeholder="رقم المحفظة" style="flex: 2;">
            </div>
            <select id="Payment" required>
                <option value="">اختر وسيلة استلام الأرباح</option>
                <option value="فودافون كاش">فودافون كاش</option>
                <option value="أورنج كاش">أورنج كاش</option>
                <option value="اتصالات كاش">اتصالات كاش</option>
                <option value="وي كاش">وي كاش</option>
            </select>
            
            <label style="color: var(--blue); font-size: 13px; cursor: pointer; display: block; margin: 10px 0;" onclick="document.getElementById('imgInp').click()">
                <span id="upTxt">📸 اضغط هنا لإضافة صورتك (اختياري)</span>
                <input type="file" id="imgInp" accept="image/*" style="display:none">
            </label>

            <button type="submit" id="subBtn">إنشاء الحساب الآن</button>
        </form>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <span class="check-icon">👑</span>
            <h2 style="color: var(--gold);">تم التسجيل بنجاح يا بطل!</h2>
            <p>أهلاً بك في عائلة BOSS SYSTEM.</p>
            <p style="font-size: 14px; color: var(--blue);">جاري تحويلك لتفعيل الحساب مع المدير...</p>
        </div>
    </div>

    <script>
        let picUrl = "https://files.catbox.moe/lhgbrl.png";
        const sheetApi = "https://sheetdb.io/api/v1/uvhb8vxlpe7ve";

        // رفع الصورة تلقائياً
        document.getElementById('imgInp').onchange = function(e) {
            const upTxt = document.getElementById('upTxt');
            upTxt.innerHTML = '<span class="loading-dots">جاري رفع الصورة</span>';
            const fd = new FormData();
            fd.append('reqtype', 'fileupload');
            fd.append('fileToUpload', e.target.files[0]);
            fetch('https://corsproxy.io/?' + encodeURIComponent('https://catbox.moe/user/api.php'), { method: 'POST', body: fd })
            .then(r => r.text()).then(url => {
                picUrl = url;
                upTxt.innerText = "✅ تم حفظ الصورة بنجاح";
            }).catch(() => upTxt.innerText = "❌ فشل الرفع، جرب مرة أخرى");
        };

        // إرسال البيانات
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerHTML = '<span class="loading-dots">جاري إرسال بياناتك</span>';
            btn.disabled = true;

            const user = {
                Name: document.getElementById('Name').value,
                Age: document.getElementById('Age').value,
                Phone: document.getElementById('Phone').value,
                Password: document.getElementById('Password').value,
                PaymentMethod: document.getElementById('Payment').value,
                Wallet: document.getElementById('Wallet').value,
                PicUrl: picUrl,
                Status: "Pending", Salary: "0", Rating: "0"
            };

            fetch(sheetApi, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: [user]})
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('successModal').style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = `https://wa.me/201285577074?text=أهلاً يا BOSS، سجلت في الموقع ومحتاج تفعيل الحساب. اسمي: ${user.Name}`;
                    }, 3000);
                } else { throw new Error(); }
            })
            .catch(() => {
                alert("حدث خطأ في الاتصال بالسيرفر، تأكد من API SheetDB");
                btn.innerText = "إعادة المحاولة";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
